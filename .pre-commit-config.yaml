# Pre-commit hooks for DeepSight monorepo.
# Install: pip install pre-commit && pre-commit install
# Manual run: pre-commit run --all-files
# See https://pre-commit.com

default_install_hook_types: [pre-commit, commit-msg]

repos:
  # ─── Generic hygiene ──────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: ^(deploy/hetzner/caddy/|extension/dist/)
      - id: check-json
        exclude: ^(extension/dist/|frontend/dist/|mobile/.expo/|tsconfig.*\.json)
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  # ─── Python (backend) ─────────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # ─── Prettier (TS/JS/JSON/YAML/MD) ────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: \.(js|jsx|ts|tsx|json|yaml|yml|md|css|html)$
        exclude: |
          (?x)^(
            backend/|
            extension/dist/|
            frontend/dist/|
            mobile/\.expo/|
            .*\.lock$|
            .*package-lock\.json$
          )

  # ─── Secrets scanning ─────────────────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # ─── Conventional Commits validation ──────────────────────────────────────
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, chore, docs, style, refactor, perf, test, build, ci, revert]
