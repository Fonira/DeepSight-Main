# ═══════════════════════════════════════════════════════════════════════════
# 🚀 DeepSight Smoke Tests — Post-Deploy
# Runs after push to main to verify deployment health
# Waits 2 minutes for Vercel/Docker to finish deploying
# ═══════════════════════════════════════════════════════════════════════════

name: Post-Deploy Smoke Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "marketing/**"

env:
  BASE_URL: "https://www.deepsightsynthesis.com"
  API_URL: ${{ secrets.API_BASE_URL }}
  HEALTH_CHECK_SECRET: ${{ secrets.HEALTH_CHECK_SECRET }}

jobs:
  post-deploy-smoke:
    name: Post-Deploy Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for deployment (2 min)
        run: |
          echo "Waiting 120 seconds for Vercel/Docker deployment to complete..."
          sleep 120

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: monitoring/package-lock.json

      - name: Install dependencies
        working-directory: monitoring
        run: npm ci

      - name: Install Playwright browsers
        working-directory: monitoring
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        id: tests
        working-directory: monitoring
        continue-on-error: true
        run: npx playwright test --reporter=line 2>&1 | tee test-output.txt

      - name: Parse test results
        id: parse
        if: always()
        working-directory: monitoring
        run: |
          PASSED=$(grep -oP '\d+(?= passed)' test-output.txt | tail -1 || echo "0")
          FAILED=$(grep -oP '\d+(?= failed)' test-output.txt | tail -1 || echo "0")

          PASSED=${PASSED:-0}
          FAILED=${FAILED:-0}

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"

          FAILED_NAMES=$(grep -E '^\s+\d+\)' test-output.txt | head -20 | sed 's/^[[:space:]]*//' || echo "")
          {
            echo "failed_names<<EOF"
            echo "$FAILED_NAMES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [ "$FAILED" != "0" ] && [ "$FAILED" != "" ]; then
            echo "has_failures=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_failures=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Telegram on FAILURE
        if: always() && steps.parse.outputs.has_failures == 'true'
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:'%s' | head -c 80)

          MESSAGE=$(cat <<MSGEOF
          🚨 *Post-Deploy Smoke Tests FAILED*

          📦 Commit: \`${COMMIT_MSG}\`
          📊 ${{ steps.parse.outputs.passed }}✅  ${{ steps.parse.outputs.failed }}❌

          🔍 *Tests échoués :*
          \`\`\`
          ${{ steps.parse.outputs.failed_names }}
          \`\`\`

          🔗 [Voir les logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          MSGEOF
          )

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            --data-urlencode "text=$MESSAGE"

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-deploy-results-${{ github.run_id }}
          path: |
            monitoring/test-results/
            monitoring/test-output.txt
            monitoring/test-results.json
          retention-days: 30

      - name: Fail job if tests failed
        if: steps.parse.outputs.has_failures == 'true'
        run: exit 1
