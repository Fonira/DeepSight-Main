# Deploy Backend to Hetzner VPS
#
# Auto-deploys the FastAPI backend to the Hetzner VPS over SSH on every push
# to `main` that touches backend code, the Hetzner deploy assets, or this
# workflow file itself. Also supports manual dispatch from the Actions tab.
#
# Required repository secrets:
#   - HETZNER_SSH_PRIVATE_KEY  (mandatory) PEM-encoded private key granting
#                              root access to the Hetzner VPS.
#   - HETZNER_HOST             (optional)  VPS hostname or IP. Defaults to
#                              89.167.23.214.
#   - HETZNER_USER             (optional)  SSH user. Defaults to `root`.
#   - TELEGRAM_BOT_TOKEN       (optional)  Enables Telegram notifications.
#   - TELEGRAM_CHAT_ID         (optional)  Target chat for notifications.
#
# Deploy flow:
#   1. Tag the currently-running image as `deepsight-backend:previous`
#      (rollback anchor).
#   2. Pull latest `main` into /opt/deepsight/repo.
#   3. Build `deepsight-backend:latest` from deploy/hetzner/Dockerfile.
#   4. Recreate `repo-backend-1` on the `repo_deepsight` network.
#   5. Smoke-test https://api.deepsightsynthesis.com/health with retries.
#   6. If the smoke test fails, automatically roll back to
#      `deepsight-backend:previous` and exit non-zero.

name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "deploy/hetzner/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Hetzner VPS
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production

    env:
      HETZNER_HOST: ${{ secrets.HETZNER_HOST || '89.167.23.214' }}
      HETZNER_USER: ${{ secrets.HETZNER_USER || 'root' }}
      HEALTH_URL: https://api.deepsightsynthesis.com/health

    steps:
      # ---------------------------------------------------------------------
      # Checkout
      # ---------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ---------------------------------------------------------------------
      # Build & Deploy
      # ---------------------------------------------------------------------
      - name: Build and deploy on Hetzner VPS
        id: deploy
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ env.HETZNER_HOST }}
          username: ${{ env.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_PRIVATE_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 12m
          script_stop: true
          script: |
            set -euo pipefail

            cd /opt/deepsight/repo

            # Tag the currently-running image as the rollback anchor.
            # If no image is tagged `latest` yet (first deploy), skip.
            if docker image inspect deepsight-backend:latest >/dev/null 2>&1; then
              docker tag deepsight-backend:latest deepsight-backend:previous
              echo "Rollback anchor updated: deepsight-backend:previous"
            else
              echo "No existing deepsight-backend:latest image - skipping rollback tag"
            fi

            # Pull the latest code.
            git fetch origin main
            git reset --hard origin/main

            # Build the new image.
            # Build context = backend/ because the Dockerfile expects
            # `src/` and `requirements.txt` at the context root.
            docker build \
              -t deepsight-backend:latest \
              -f deploy/hetzner/Dockerfile \
              backend

            # ─── Trivy scan (HIGH/CRITICAL CVE check) ──────────────────────
            # Warn-only for now. Flip --exit-code to 1 once the baseline is
            # clean (track in docs/RUNBOOK.md "Tightening Trivy").
            echo "[trivy] Scanning deepsight-backend:latest for HIGH/CRITICAL CVEs..."
            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v /tmp/trivy-cache:/root/.cache/trivy \
              aquasec/trivy:latest image \
              --severity HIGH,CRITICAL \
              --ignore-unfixed \
              --no-progress \
              --exit-code 0 \
              --timeout 5m \
              deepsight-backend:latest || \
              echo "::warning::Trivy reported vulnerabilities (non-blocking)"

            # Recreate the backend container.
            # Bind-mounts (read-only):
            #   /opt/deepsight/cookies.txt        → /app/cookies.txt
            #     yt-dlp YouTube cookies (bypass bot challenge on visual storyboard).
            #   /opt/deepsight/tiktok_cookies.txt → /app/tiktok_cookies.txt
            #     yt-dlp TikTok cookies (Decodo proxy + bot challenge bypass).
            # We `touch -a` both before the docker run so the bind-mount never
            # fails on first deploy if the file hasn't been uploaded yet
            # (empty cookies = yt-dlp runs without auth, tikwm fallback covers).
            touch -a /opt/deepsight/cookies.txt /opt/deepsight/tiktok_cookies.txt
            docker stop repo-backend-1 || true
            docker rm repo-backend-1 || true
            docker run -d \
              --name repo-backend-1 \
              --network repo_deepsight \
              --network-alias backend \
              --env-file /opt/deepsight/repo/.env.production \
              --restart unless-stopped \
              -p 127.0.0.1:8080:8080 \
              -v /opt/deepsight/cookies.txt:/app/cookies.txt:ro \
              -v /opt/deepsight/tiktok_cookies.txt:/app/tiktok_cookies.txt:ro \
              deepsight-backend:latest

            echo "Deployed SHA: $(git rev-parse HEAD)"

      # ---------------------------------------------------------------------
      # Health Check
      # ---------------------------------------------------------------------
      - name: Smoke test /health
        id: healthcheck
        run: |
          echo "Probing ${HEALTH_URL}"
          curl -fsS \
            --max-time 30 \
            --retry 5 \
            --retry-delay 3 \
            --retry-all-errors \
            "${HEALTH_URL}"
          echo ""
          echo "Health check passed"

      # ---------------------------------------------------------------------
      # Rollback (only runs if the deploy succeeded but the smoke test failed)
      # ---------------------------------------------------------------------
      - name: Rollback to previous image
        if: failure() && steps.deploy.outcome == 'success' && steps.healthcheck.outcome == 'failure'
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ env.HETZNER_HOST }}
          username: ${{ env.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_PRIVATE_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 5m
          script_stop: true
          script: |
            set -euo pipefail

            if ! docker image inspect deepsight-backend:previous >/dev/null 2>&1; then
              echo "No deepsight-backend:previous image available - cannot rollback"
              exit 1
            fi

            echo "Rolling back to deepsight-backend:previous"
            docker tag deepsight-backend:previous deepsight-backend:latest

            touch -a /opt/deepsight/cookies.txt /opt/deepsight/tiktok_cookies.txt
            docker stop repo-backend-1 || true
            docker rm repo-backend-1 || true
            docker run -d \
              --name repo-backend-1 \
              --network repo_deepsight \
              --network-alias backend \
              --env-file /opt/deepsight/repo/.env.production \
              --restart unless-stopped \
              -p 127.0.0.1:8080:8080 \
              -v /opt/deepsight/cookies.txt:/app/cookies.txt:ro \
              -v /opt/deepsight/tiktok_cookies.txt:/app/tiktok_cookies.txt:ro \
              deepsight-backend:latest

            echo "Rollback complete"

      - name: Verify rollback health
        if: failure() && steps.deploy.outcome == 'success' && steps.healthcheck.outcome == 'failure'
        run: |
          echo "Verifying ${HEALTH_URL} after rollback"
          curl -fsS \
            --max-time 30 \
            --retry 5 \
            --retry-delay 3 \
            --retry-all-errors \
            "${HEALTH_URL}" || {
              echo "::error::Rollback did not restore a healthy backend"
              exit 1
            }
          echo ""
          echo "Rollback verified - backend is healthy on previous image"

      # ---------------------------------------------------------------------
      # Notifications (optional - only fire if Telegram secrets are present)
      # ---------------------------------------------------------------------
      - name: Notify success
        if: success()
        run: |
          if [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ] && [ -n "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            curl -s -X POST \
              "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d parse_mode="HTML" \
              -d text="<b>DeepSight Backend Deployed</b>%0A%0ACommit: <code>${SHORT_SHA}</code>%0ABy: ${{ github.actor }}%0A<a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'>View logs</a>"
          fi

      - name: Notify failure
        if: failure()
        run: |
          if [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ] && [ -n "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            curl -s -X POST \
              "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d parse_mode="HTML" \
              -d text="<b>DeepSight Backend Deploy FAILED</b>%0A%0ACommit: <code>${SHORT_SHA}</code>%0ABy: ${{ github.actor }}%0A<a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'>View logs</a>"
          fi
