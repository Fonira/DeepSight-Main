name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "deploy/hetzner/**"
      - ".github/workflows/deploy-backend.yml"

  # Permet un déploiement manuel depuis l'onglet Actions
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run tests
        continue-on-error: true
        run: |
          cd backend
          python -m pytest --tb=short -q \
            --deselect tests/core/test_mistral_agent.py::TestWebSearchProviderIntegration::test_uses_agent_when_available \
            --deselect tests/core/test_mistral_batch.py::TestGetBatchResults::test_parses_success_results \
            --deselect tests/core/test_mistral_batch.py::TestGetBatchResults::test_handles_error_entries \
            --ignore=tests/core/test_plan_limits.py \
            --ignore=tests/test_plan_gates.py

  deploy:
    name: Deploy to Hetzner VPS
    runs-on: ubuntu-latest
    needs: [test]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/id_hetzner
          chmod 600 ~/.ssh/id_hetzner
          ssh-keyscan -H ${{ secrets.HETZNER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Pull latest code on VPS
        run: |
          ssh -i ~/.ssh/id_hetzner root@${{ secrets.HETZNER_HOST }} \
            "cd /opt/deepsight/repo && git fetch origin main && git reset --hard origin/main"

      - name: Build Docker image
        run: |
          ssh -i ~/.ssh/id_hetzner root@${{ secrets.HETZNER_HOST }} \
            "cd /opt/deepsight/repo && docker build -t deepsight-backend:latest -f deploy/hetzner/Dockerfile ./backend"

      - name: Stop existing backend container
        run: |
          ssh -i ~/.ssh/id_hetzner root@${{ secrets.HETZNER_HOST }} \
            "docker rm -f repo-backend-1 2>/dev/null || true"

      - name: Deploy with docker compose
        run: |
          ssh -i ~/.ssh/id_hetzner root@${{ secrets.HETZNER_HOST }} \
            "cd /opt/deepsight/repo && docker compose -p repo -f deploy/hetzner/docker-compose.yml up -d --no-deps backend"

      - name: Wait for startup
        run: sleep 20

      - name: Health check
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://api.deepsightsynthesis.com/health" \
              --max-time 10)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed"
              exit 0
            fi
            echo "Attempt $i: status $STATUS, retrying in 15s..."
            sleep 15
          done
          echo "::error::Health check failed after 5 attempts"
          exit 1

      - name: Notify success
        if: success()
        run: |
          if [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ]; then
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            curl -s -X POST \
              "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d parse_mode="HTML" \
              -d text="✅ <b>DeepSight Backend Deployed</b>%0A%0ACommit: <code>${SHORT_SHA}</code>%0ABy: ${{ github.actor }}%0A<a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'>View logs</a>"
          fi

      - name: Notify failure
        if: failure()
        run: |
          if [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ]; then
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            curl -s -X POST \
              "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d parse_mode="HTML" \
              -d text="❌ <b>DeepSight Backend Deploy FAILED</b>%0A%0ACommit: <code>${SHORT_SHA}</code>%0ABy: ${{ github.actor }}%0A<a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'>View logs</a>"
          fi

      - name: Cleanup SSH
        if: always()
        run: rm -rf ~/.ssh/id_hetzner
