name: Lighthouse CI

# Runs Lighthouse against the Vercel preview deployment of every PR.
# Currently in WARN-ONLY mode — see frontend/.lighthouserc.cjs and
# docs/RUNBOOK.md §20 for the procedure to flip to blocking.
#
# Skip this check on a one-off PR by adding the `skip-lighthouse` label.

on:
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/lighthouse-ci.yml"

concurrency:
  group: lighthouse-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  lighthouse:
    name: Lighthouse on Vercel preview
    runs-on: ubuntu-latest
    # Allow skip via PR label (e.g. infra-only changes, hotfixes).
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-lighthouse') }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Wait for Vercel preview deployment
        id: vercel-preview
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 300 # 5 min — enough for a cold Vercel build
          check_interval: 10
          # Restrict to the right Vercel project (DeepSight frontend prod).
          environment: Preview

      - name: Show preview URL
        run: echo "Preview is live at ${{ steps.vercel-preview.outputs.url }}"

      - name: Build URL list for Lighthouse
        id: urls
        run: |
          BASE="${{ steps.vercel-preview.outputs.url }}"
          # Strip trailing slash so we don't end up with `//login`.
          BASE="${BASE%/}"
          {
            echo "urls<<EOF"
            echo "$BASE/"
            echo "$BASE/login"
            echo "$BASE/upgrade"
            echo "$BASE/legal/privacy"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: ${{ steps.urls.outputs.urls }}
          configPath: ./frontend/.lighthouserc.cjs
          uploadArtifacts: true
          temporaryPublicStorage: true
          # WARN-ONLY for now — see RUNBOOK §20 to make blocking.
          # The lhci config uses "warn" assertions, but we also
          # set this so a hard failure in the action doesn't fail PR.
          runs: 1

      - name: Comment Lighthouse summary on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // The action drops links + scores into .lighthouseci/manifest.json
            const manifestPath = path.join(
              process.env.GITHUB_WORKSPACE,
              '.lighthouseci',
              'manifest.json',
            );
            if (!fs.existsSync(manifestPath)) {
              core.warning('No manifest.json — Lighthouse run may have failed.');
              return;
            }

            const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
            const lines = [
              '### Lighthouse CI — preview report',
              '',
              `Preview: ${{ steps.vercel-preview.outputs.url }}`,
              '',
              '| URL | Perf | A11y | Best Practices | SEO | Report |',
              '| --- | ---: | ---: | ---: | ---: | --- |',
            ];
            for (const run of manifest) {
              const summary = run.summary || {};
              const fmt = (v) =>
                typeof v === 'number' ? Math.round(v * 100) : 'N/A';
              const url = run.url || '(unknown)';
              const link = run.htmlPath
                ? `[view](${run.htmlPath.replace(/^.*\.lighthouseci\//, '.lighthouseci/')})`
                : '—';
              lines.push(
                `| \`${url}\` | ${fmt(summary.performance)} | ${fmt(summary.accessibility)} | ${fmt(summary['best-practices'])} | ${fmt(summary.seo)} | ${link} |`,
              );
            }
            lines.push(
              '',
              '<sub>Mode: **warn-only** (failed budgets do NOT fail the check yet).',
              ' See [`docs/RUNBOOK.md`](../blob/main/docs/RUNBOOK.md#20-frontend-perf-gates) §20 to switch to blocking.</sub>',
            );

            const body = lines.join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const previous = comments.find(
              (c) =>
                c.user.type === 'Bot' &&
                c.body.startsWith('### Lighthouse CI — preview report'),
            );
            if (previous) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
