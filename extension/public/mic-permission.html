<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>DeepSight — Autoriser le micro</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      body {
        margin: 0;
        background: linear-gradient(135deg, #0a0a0f 0%, #1a0a2a 100%);
        color: #f5f5f7;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        max-width: 380px;
        text-align: center;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: 32px 28px;
        backdrop-filter: blur(20px);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 18px;
        font-weight: 600;
      }
      p {
        margin: 0 0 24px;
        font-size: 13px;
        line-height: 1.5;
        opacity: 0.8;
      }
      button {
        width: 100%;
        padding: 14px 20px;
        background: linear-gradient(135deg, #ec4899, #8b5cf6);
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.15s ease;
      }
      button:hover {
        transform: translateY(-1px);
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .status {
        margin-top: 16px;
        font-size: 12px;
        min-height: 18px;
      }
      .status.ok {
        color: #34d399;
      }
      .status.err {
        color: #fb7185;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>🎙️ Autoriser le micro</h1>
      <p>
        DeepSight a besoin de ton micro pour démarrer l'appel vocal avec l'agent
        IA. Clique sur le bouton ci-dessous, puis choisis
        <strong>« Autoriser »</strong> dans la popup Chrome.
      </p>
      <button id="grant-btn" type="button">🎤 Demander l'accès au micro</button>
      <div id="status" class="status"></div>
    </div>
    <script src="mic-permission.js"></script>
  </body>
</html>
