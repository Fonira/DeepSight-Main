# ═══════════════════════════════════════════════════════════════════════════════
# DeepSight Production Stack — Hetzner VPS
#
# Usage depuis /opt/deepsight/repo :
#   docker compose -f deploy/hetzner/docker-compose.yml up -d
#
# Rebuild backend après changement de code :
#   docker compose -f deploy/hetzner/docker-compose.yml up -d --build backend
#
# ⚠️ Les noms de containers (container_name) et le réseau correspondent
#    exactement à la config de production existante pour éviter toute casse.
# ═══════════════════════════════════════════════════════════════════════════════

networks:
  repo_deepsight:
    name: repo_deepsight
    external: true

volumes:
  postgres_data:
    name: repo_postgres_data
  redis_data:
    name: repo_redis_data
  caddy_data:
    name: repo_caddy_data
  caddy_config:
    name: repo_caddy_config

services:
  # ─── PostgreSQL 17 ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: repo-postgres-1
    restart: unless-stopped
    networks:
      - repo_deepsight
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - /opt/deepsight/backups:/backups
      # Init scripts run on FIRST init only (empty data dir). On existing
      # volumes, run extensions manually via psql (cf. docs/RUNBOOK.md).
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-deepsight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-deepsight}
      PGDATA: /var/lib/postgresql/data
    # Enable pg_stat_statements for slow-query monitoring.
    # Requires CREATE EXTENSION pg_stat_statements; (handled by init script).
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.max=10000
      -c pg_stat_statements.track=all
      -c log_min_duration_statement=500
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-deepsight} -d ${POSTGRES_DB:-deepsight}",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  # ─── Redis 7 ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: repo-redis-1
    restart: unless-stopped
    networks:
      - repo_deepsight
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── FastAPI Backend (4 workers Uvicorn) ────────────────────────────────────
  backend:
    build:
      context: ../../backend
      dockerfile: ../deploy/hetzner/Dockerfile
    image: deepsight-backend:latest
    container_name: repo-backend-1
    restart: unless-stopped
    networks:
      - repo_deepsight
    volumes:
      # YouTube + TikTok cookies for yt-dlp auth (paths match deploy-backend.yml
      # workflow convention — files live OUTSIDE the git repo dir for safety).
      # YOUTUBE_COOKIES_PATH=/app/cookies.txt, TIKTOK_COOKIES_PATH=/app/tiktok_cookies.txt.
      # Source files on host: /opt/deepsight/{cookies,tiktok_cookies}.txt (uploaded via scp).
      # Read-only mount — backend never writes back. Empty files OK (auth no-op).
      - /opt/deepsight/cookies.txt:/app/cookies.txt:ro
      - /opt/deepsight/tiktok_cookies.txt:/app/tiktok_cookies.txt:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../../.env.production
    environment:
      PORT: "8080"
      ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-deepsight}:${POSTGRES_PASSWORD}@repo-postgres-1:5432/${POSTGRES_DB:-deepsight}
      REDIS_URL: redis://repo-redis-1:6379/0
      DB_POOL_SIZE: "20"
      DB_MAX_OVERFLOW: "10"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─── Caddy — Reverse Proxy + Auto-SSL ──────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: repo-caddy-1
    restart: unless-stopped
    networks:
      - repo_deepsight
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
