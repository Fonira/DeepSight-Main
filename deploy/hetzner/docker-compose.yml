# ═══════════════════════════════════════════════════════════════════════════════
# DeepSight Production Stack — Hetzner VPS
#
# ⚠️ DORMANT — non utilisé en production (au 2026-04-28).
#
# La prod tourne en `docker run` direct depuis le webhook
# `junglefarmz-deploy.service` (cf. AUTODEPLOY.md). Aucun container actuel
# ne porte les labels `com.docker.compose.*`.
#
# Ce fichier est conservé pour :
#   - servir de référence (services/healthchecks/volumes canoniques)
#   - servir de fallback si on migre vers `docker compose up -d` plus tard
#   - démarrer une stack de staging locale
#
# NE PAS lancer `docker compose up` sur la prod tant que les containers
# existants (repo-backend-1, repo-postgres-1, repo-redis-1, repo-caddy-1)
# n'ont pas été décommissionnés proprement.
# ═══════════════════════════════════════════════════════════════════════════════

networks:
  repo_deepsight:
    name: repo_deepsight
    external: true

volumes:
  postgres_data:
    name: repo_postgres_data
  redis_data:
    name: repo_redis_data
  caddy_data:
    name: repo_caddy_data
  caddy_config:
    name: repo_caddy_config

services:
  # ─── PostgreSQL 17 ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: repo-postgres-1
    restart: unless-stopped
    networks:
      - repo_deepsight
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - /opt/deepsight/backups:/backups
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-deepsight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-deepsight}
      PGDATA: /var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-deepsight} -d ${POSTGRES_DB:-deepsight}",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  # ─── Redis 7 ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: repo-redis-1
    restart: unless-stopped
    networks:
      - repo_deepsight
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── FastAPI Backend (4 workers Uvicorn) ────────────────────────────────────
  backend:
    build:
      context: ../../backend
      dockerfile: ../deploy/hetzner/Dockerfile
    image: deepsight-backend:latest
    container_name: repo-backend-1
    restart: unless-stopped
    networks:
      - repo_deepsight
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../../.env.production
    environment:
      PORT: "8080"
      ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-deepsight}:${POSTGRES_PASSWORD}@repo-postgres-1:5432/${POSTGRES_DB:-deepsight}
      REDIS_URL: redis://repo-redis-1:6379/0
      DB_POOL_SIZE: "20"
      DB_MAX_OVERFLOW: "10"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─── Caddy — Reverse Proxy + Auto-SSL ──────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: repo-caddy-1
    restart: unless-stopped
    networks:
      - repo_deepsight
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
